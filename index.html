<title>N5 單字測驗</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #333;
  }
  .container {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 600px;
    width: 100%;
    padding: 32px;
  }
  h1 {
    text-align: center;
    color: #667eea;
    margin-bottom: 8px;
    font-size: 28px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .stats {
    display: flex;
    justify-content: space-between;
    background: #f5f5f9;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 14px;
  }
  .stats span { color: #667eea; font-weight: bold; }
  .question {
    background: #fafafe;
    border-left: 4px solid #667eea;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    min-height: 140px;
  }
  .q-label {
    color: #888;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 24px;
    font-weight: bold;
    color: #333;
    margin-bottom: 12px;
    word-break: break-word;
  }
  .q-reading {
    color: #667eea;
    font-size: 16px;
    margin-bottom: 8px;
  }
  .q-hint {
    margin-top: 10px;
    padding: 10px 14px;
    background: #f0f0fc;
    border-radius: 8px;
    color: #555;
    font-size: 14px;
    line-height: 1.6;
  }
  .q-hint strong { color: #667eea; }
  .options {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .opt {
    background: #fff;
    border: 2px solid #e0e0e8;
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    text-align: left;
    font-family: inherit;
    color: #333;
  }
  .opt:hover:not(:disabled) {
    border-color: #667eea;
    background: #f0f0fc;
    transform: translateY(-1px);
  }
  .opt:disabled { cursor: not-allowed; }
  .opt.correct {
    background: #d4f5dd;
    border-color: #4caf50;
    color: #2e7d32;
  }
  .opt.wrong {
    background: #ffd6d6;
    border-color: #f44336;
    color: #c62828;
  }
  .feedback {
    text-align: center;
    font-size: 16px;
    font-weight: bold;
    min-height: 24px;
    margin-bottom: 12px;
  }
  .feedback.correct { color: #4caf50; }
  .feedback.wrong { color: #f44336; }
  .btn {
    width: 100%;
    padding: 14px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn:hover { background: #5568d3; }
  .btn:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  .start-screen, .end-screen { text-align: center; }
  .start-screen p, .end-screen p {
    color: #555;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .end-score {
    font-size: 48px;
    color: #667eea;
    font-weight: bold;
    margin: 16px 0;
  }
  .mode-select {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .mode-btn {
    flex: 1;
    padding: 12px;
    background: #f5f5f9;
    border: 2px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    color: #555;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: #f0f0fc;
    border-color: #667eea;
    color: #667eea;
    font-weight: bold;
  }
</style>

  { pattern: "〜たい", prompt: "水___飲みたいです。", options: ["を", "が", "に", "は"], answer: "が", note: "願望:〜たい 對象助詞用 を→が" },
  { pattern: "〜てもいい", prompt: "ここで写真__(撮っ)__もいいですか。", options: ["撮って", "撮る", "撮った", "撮らない"], answer: "撮って", note: "許可:動詞て形 + もいいです" },
  { pattern: "〜なければなりません", prompt: "明日早く__(起き)__なければなりません。", options: ["起きる", "起きに", "起きて", "起き"], answer: "起きて", note: "義務:動詞て形 + なければなりません" },
  { pattern: "〜ことができる", prompt: "日本語___話すことができます。", options: ["を", "は", "が", "に"], answer: "が", note: "可能:〜ことができる,對象助詞用を→が" },
  { pattern: "〜とき", prompt: "暇___時、本を読みます。", options: ["な", "の", "に", "で"], answer: "の", note: "連接:名詞 + の + とき" },
  { pattern: "〜と思います", prompt: "日本は便利__(だ)__と思います。", options: ["だ", "な", "に", "を"], answer: "な", note: "思量:〜だと思います,な形容詞/名詞用な" },
  { pattern: "〜て形並列", prompt: "朝ごはんを__(食べ)__、学校に行きます。", options: ["食べて", "食べる", "食べた", "食べ"], answer: "食べて", note: "て形表動作接續(並列):〜て、" },
  { pattern: "〜ても", prompt: "高く__(ない)__、買いたいです。", options: ["なくても", "ないと", "なければ", "なかったら"], answer: "なくても", note: "讓步:〜ても = 即使〜也" },
  { pattern: "〜ないで", prompt: "何も__(食べ)__帰りました。", options: ["食べないで", "食べなくて", "食べないと", "食べなかった"], answer: "食べないで", note: "否定接續(不〜而〜):〜ないで" },
  { pattern: "〜ようになる", prompt: "毎日勉強して、日本語が__(話せる)__なりました。", options: ["話せるように", "話せることに", "話せるために", "話せるのに"], answer: "話せるように", note: "變化:〜ようになる(變得會〜)" },
  { pattern: "〜ようにする", prompt: "早く__(寝る)__ようにしています。", options: ["寝る", "寝て", "寝た", "寝"], answer: "寝る", note: "習慣/努力:〜ようにする(辭書形)" },
  { pattern: "〜てしまう", prompt: "ケーキを全部__(食べ)__しまいました。", options: ["食べて", "食べる", "食べた", "食べ"], answer: "食べて", note: "完了/遺憾:〜てしまう" },
  { pattern: "〜ておく", prompt: "先にチケットを__(買っ)__おいてください。", options: ["買って", "買う", "買った", "買わ"], answer: "買って", note: "預備/事先:〜ておく" },
  { pattern: "〜ば(仮定)", prompt: "安___、買います。", options: ["ければ", "いなら", "かったら", "いから"], answer: "ければ", note: "假定:い形容詞 〜ければ" },
  { pattern: "〜たら(条件)", prompt: "雨が降っ___、行きません。", options: ["たら", "ば", "なら", "と"], answer: "たら", note: "條件:〜たら(過去形 + ら)" },
  { pattern: "〜なら", prompt: "日本へ行く___、京都がいいです。", options: ["なら", "たら", "ば", "と"], answer: "なら", note: "話題條件:〜なら" },
  { pattern: "〜そうです(様態)", prompt: "雨が___です。", options: ["降りそう", "降るそう", "降ったそう", "降れのそう"], answer: "降りそう", note: "様態:〜そうです(看起來〜,ます形去ます + そう)" },
  { pattern: "〜そうです(伝聞)", prompt: "先生によると、試験は難しい___です。", options: ["だそう", "なそう", "にそう", "のそう"], answer: "だそう", note: "傳聞:〜そうです(聽說〜,普通形 + そう)" },
  { pattern: "〜過ぎます", prompt: "ちょっと___すぎました。", options: ["食べ", "食べて", "食べた", "食べる"], answer: "食べ", note: "過度:ます形去ます + 過ぎます" },
  { pattern: "〜ように", prompt: "忘れない___メモします。", options: ["ように", "ために", "のに", "ことに"], answer: "ように", note: "目的/間接指示:〜ように" },
  { pattern: "〜ために", prompt: "日本語を勉強する___、日本へ行きました。", options: ["ために", "ように", "のに", "ことに"], answer: "ために", note: "目的:〜ために" },
  { pattern: "〜について", prompt: "この本について___思いますか。", options: ["どう", "なに", "どこ", "いつ"], answer: "どう", note: "關於:〜について" },
  { pattern: "〜間", prompt: "勉強する___、音楽を聞きます。", options: ["間", "時に", "時", "間に"], answer: "間", note: "時間範圍:〜間(〜的期間一直〜)" },
  { pattern: "〜中(ちゅう)", prompt: "今、会議___です。", options: ["中", "の時", "間に", "中に"], answer: "中", note: "正在進行:〜中(ちゅう)" },
  { pattern: "〜上(じょう)", prompt: "仕事の___、電話しました。", options: ["上", "中", "間", "時"], answer: "上", note: "〜的時候(文語):〜上" },
  { pattern: "〜はずです", prompt: "彼は来る___です。", options: ["はず", "よう", "そう", "つもり"], answer: "はず", note: "推測/理應:〜はずです" }

];



// 移除重複(基於 ja + reading 唯一)
const seen = new Set();
const UNIQUE_VOCAB = VOCAB.filter(v => {
  const key = v.ja + "|" + v.reading;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

const PER_ROUND = 20;
const OPTIONS_PER_Q = 4;

let mode = "ja2zh";  // ja2zh | zh2ja
// ja2zh: 漢字 → 中文
// zh2ja: 中文 → 漢字(答完才揭曉讀音)
// kana2zh: 平假名/片假名 → 中文(答完才揭曉漢字)
let pool = [];       // 當前題庫
let poolIdx = 0;
let currentQ = null;
let score = 0;
let answered = 0;
let answeredThisQ = false;
let wrongQueue = []; // 錯題,稍後重出

// ====== 工具 ======
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr, n, exclude = null) {
  const filtered = exclude ? arr.filter(x => x !== exclude) : arr.slice();
  return shuffle(filtered).slice(0, n);
}

function buildQuestion() {
  // 從 pool 取一題,做 4 選 1
  const answer = pool[poolIdx % pool.length];
  poolIdx++;

  // 文法題分支
  if (mode === "grammar") {
    const wrongs = pickRandom(GRAMMAR.map(g => g.answer), OPTIONS_PER_Q - 1, answer.answer);
    const opts = shuffle([answer.answer, ...wrongs]);
    return {
      question: answer.prompt,
      sub: answer.pattern,
      hidden: "文型 / 解析",
      reveal: `${answer.pattern} — ${answer.note}`,
      options: opts,
      answer: answer.answer,
      raw: answer,
    };
  }

  // 選項
  let opts;
  if (mode === "ja2zh") {
    // 題目:ja(漢字/單字) → 選 zh
    // 兩段式:先給漢字,答完才顯示讀音(平假名)
    const wrongs = pickRandom(UNIQUE_VOCAB.map(v => v.zh), OPTIONS_PER_Q - 1, answer.zh);
    opts = shuffle([answer.zh, ...wrongs]);
    return {
      question: answer.ja,
      sub: answer.reading,
      hidden: "讀音 / 假名",
      reveal: answer.reading,
      options: opts,
      answer: answer.zh,
      raw: answer,
    };
  } else if (mode === "zh2ja") {
    // 題目:zh → 選 ja
    // 兩段式:先給中文,答完才顯示日文漢字
    const wrongs = pickRandom(UNIQUE_VOCAB.map(v => v.ja), OPTIONS_PER_Q - 1, answer.ja);
    opts = shuffle([answer.ja, ...wrongs]);
    return {
      question: answer.zh,
      sub: answer.reading,
      hidden: "日文 / 漢字",
      reveal: `${answer.ja}（${answer.reading}）`,
      options: opts,
      answer: answer.ja,
      raw: answer,
    };
  } else {
    // kana2zh: 假名 → 中文
    // 兩段式:先給假名,答完才揭曉漢字
    const prompt = answer.katakana || answer.reading;
    const wrongs = pickRandom(UNIQUE_VOCAB.map(v => v.zh), OPTIONS_PER_Q - 1, answer.zh);
    opts = shuffle([answer.zh, ...wrongs]);
    return {
      question: prompt,
      sub: "",
      hidden: "漢字 / 單字",
      reveal: `${answer.ja}（${answer.reading}）`,
      options: opts,
      answer: answer.zh,
      raw: answer,
    };
  }
}

// ====== 渲染 ======
function render() {
  const app = document.getElementById("app");
  if (state === "start") return renderStart(app);
  if (state === "playing") return renderPlaying(app);
  if (state === "end") return renderEnd(app);
}

let state = "start";

function renderStart(app) {
  const isGrammar = mode === "grammar";
  const titleText = isGrammar ? "N5 文法測驗" : "N5 單字測驗";
  const subText = isGrammar
    ? `文法題庫 ${GRAMMAR.length} 題 / 每次 ${Math.min(PER_ROUND, GRAMMAR.length)} 題`
    : `單字資料庫 ${UNIQUE_VOCAB.length} 個 / 每次 ${PER_ROUND} 題`;
  app.innerHTML = `
    <h1>${titleText}</h1>
    <div class="subtitle">${subText}</div>
    <div class="start-screen">
      <p>${isGrammar ? '從文法題庫隨機抽出題目,答錯的題目稍後會再回來考你一次。' : `從單字資料庫隨機抽出 ${PER_ROUND} 題,答錯的題目稍後會再回來考你一次。`}</p>
      <p style="color:#888;font-size:13px">中途答錯的會自動放回題庫尾部,確保本輪一定會再遇到。</p>
      <div class="mode-select">
        <button class="mode-btn ${mode==='ja2zh'?'active':''}" id="m-ja2zh">漢字 → 中文</button>
        <button class="mode-btn ${mode==='kana2zh'?'active':''}" id="m-kana2zh">假名 → 中文</button>
        <button class="mode-btn ${mode==='zh2ja'?'active':''}" id="m-zh2ja">中文 → 日文</button>
        <button class="mode-btn ${mode==='grammar'?'active':''}" id="m-grammar">📝 文法練習</button>
      </div>
      <button class="btn" id="start">開始</button>
    </div>
  `;
  document.getElementById("m-ja2zh").onclick = () => { mode = "ja2zh"; render(); };
  document.getElementById("m-kana2zh").onclick = () => { mode = "kana2zh"; render(); };
  document.getElementById("m-zh2ja").onclick = () => { mode = "zh2ja"; render(); };
  const gbtn = document.getElementById("m-grammar");
  if (gbtn) gbtn.onclick = () => { mode = "grammar"; render(); };
  document.getElementById("start").onclick = startGame;
}

function renderPlaying(app) {
  if (!currentQ) return;
  const total = pool.length;
  const progress = answered + 1;
  app.innerHTML = `
    <h1>${mode === 'grammar' ? 'N5 文法測驗' : 'N5 單字測驗'}</h1>
    <div class="stats">
      <div>第 <span>${progress}</span> / ${total} 題</div>
      <div>答對 <span>${score}</span></div>
      <div>錯題 <span>${wrongQueue.length}</span></div>
    </div>
    <div class="question">
      <div class="q-label">${mode === 'ja2zh' ? '漢字 → 中文' : mode === 'kana2zh' ? '假名 → 中文' : mode === 'grammar' ? '文法填空' : '中文 → 日文'}</div>
      <div class="q-text">${escape(currentQ.question)}</div>
      <div id="reveal-area"></div>
    </div>
    <div class="options" id="opts">
      ${currentQ.options.map((o, i) => `
        <button class="opt" data-idx="${i}">${escape(o)}</button>
      `).join("")}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="btn" id="next" disabled>下一題</button>
  `;

  // 綁定選項
  document.querySelectorAll(".opt").forEach(btn => {
    btn.onclick = () => answer(btn);
  });
  document.getElementById("next").onclick = nextQ;
}

function renderEnd(app) {
  const rate = Math.round((score / answered) * 100) || 0;
  app.innerHTML = `
    <h1>本輪結束</h1>
    <div class="end-screen">
      <div class="end-score">${score} / ${answered}</div>
      <p>正確率 ${rate}%</p>
      <p style="color:#888;font-size:14px">錯題已重抽再戰,或重新開始換一批題目</p>
      <button class="btn" id="again">再來一輪</button>
    </div>
  `;
  document.getElementById("again").onclick = startGame;
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

// ====== 遊戲邏輯 ======
function startGame() {
  if (mode === "grammar") {
    pool = shuffle(GRAMMAR).slice(0, Math.min(PER_ROUND * 3, GRAMMAR.length));
  } else {
    pool = shuffle(UNIQUE_VOCAB).slice(0, Math.min(PER_ROUND * 3, UNIQUE_VOCAB.length));
  }
  poolIdx = 0;
  score = 0;
  answered = 0;
  wrongQueue = [];
  answeredThisQ = false;
  currentQ = buildQuestion();
  state = "playing";
  render();
}

function answer(btn) {
  if (answeredThisQ) return;
  answeredThisQ = true;
  const chosen = btn.dataset.idx;
  const correct = currentQ.options.indexOf(currentQ.answer);
  const fb = document.getElementById("fb");
  const allBtns = document.querySelectorAll(".opt");

  allBtns.forEach((b, i) => {
    b.disabled = true;
    if (i == correct) b.classList.add("correct");
  });

  if (chosen == correct) {
    fb.textContent = "✓ 正解!";
    fb.className = "feedback correct";
    score++;
  } else {
    btn.classList.add("wrong");
    fb.textContent = `✗ 答錯了,正確答案是「${currentQ.answer}」`;
    fb.className = "feedback wrong";
    // 錯題回池:加到 pool 尾
    wrongQueue.push(currentQ.raw);
  }

  // 揭曉另一部分(平假名 / 漢字)
  const reveal = document.getElementById("reveal-area");
  if (reveal) {
    reveal.innerHTML = `<div class="q-hint"><strong>${escape(currentQ.hidden)}：</strong>${escape(currentQ.reveal)}</div>`;
  }

  answered++;
  document.getElementById("next").disabled = false;
}

function nextQ() {
  answeredThisQ = false;
  // 錯題先出(從 queue 頭)
  if (wrongQueue.length > 0) {
    const reAnswer = wrongQueue.shift();
    const temp = pool[poolIdx % pool.length];
    pool[poolIdx % pool.length] = reAnswer;
    poolIdx++;
  }
  if (poolIdx >= pool.length && wrongQueue.length === 0) {
    state = "end";
    render();
    return;
  }
  currentQ = buildQuestion();
  render();
}

render();
</script>
